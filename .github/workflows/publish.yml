name: Build calendar feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "config/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

concurrency:
  group: "build-calendar"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build feed
        run: npm run build

      - name: Commit rebuilt docs
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "Rebuild calendar feed"
            git push
          fi
